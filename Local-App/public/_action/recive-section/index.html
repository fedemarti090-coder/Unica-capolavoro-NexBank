<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0">
    <title>NexBank / Ricevi</title>
    <link rel="stylesheet" href="../../_animation.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="message-store"
        style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;">
    </div>

    <div class="wallet-header animation-box">
        <span>Ricevi denaro</span>

        <div class="actions">
            <button title="Indietro" onclick="window.electronAPI.carica_html('home');">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>
    </div>

    <div class="container animation-box">

        <!-- SEZIONE CARTA -->
        <div class="card-section" style="cursor: pointer; user-select: none;"
            onclick="window.electronAPI.carica_html('_action/wallet'); global_var.back_html = '_action/recive'; save_global_var();">
            <div class="section-title" style="margin-top: 15px;">Carta</div>

            <div class="card-columns">
                <img id="main-card" src="../../../img/carte/carta.png" class="payment-card" draggable="false"
                    alt="Carta">

                <div class="card-info-box">
                    <span id="card-number" class="card-number">**** **** **** 1234</span>
                    <span id="intestatario" class="card-holder">MARIO ROSSI</span>
                </div>
            </div>
            <div id="balance" class="section-title" style="margin-top: 15px; font-size: 40px; text-align: center;">
                12.00£</div>
        </div>

        <div class="card-section" style="user-select: none; cursor: pointer;" id="qr-box">
            <div id="qr-container">
                <img id="qr-canvas" src="" alt="QR Code" width="70" height="70" data-link-pagamento=""/>
                <h3 id="qr-text">Ricevi tramite QR code</h3>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">Notifiche</div>
            <div id="box-popup"></div>

        </div>




    </div>
    <script src="../../_advice.js"></script>

    <script src="script.js"></script>

</body>

</html>
