<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0">
  <title>NexBank / Wallet</title>
  <link rel="stylesheet" href="../../_animation.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="message-store"
    style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;">
  </div>

  <div class="wallet-header animation-box">
    <span>Wallet</span>

    <div class="actions">
      <button title="Aggiungi" onclick="window.electronAPI.carica_html('card');">+</button>

      <button title="Indietro" onclick="window.electronAPI.carica_html(global_var.back_html || 'home');">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
          <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <div class="container animation-box" id="card-box" style="user-select: none;">

  </div>
  <script src="../../_advice.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="script.js"></script>

</body>

</html>
