<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexBank / Flash Card</title>
  <link rel="stylesheet" href="../_animation.css">
  <link rel="stylesheet" href="style.css">
</head>


<div id="message-store" style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;"></div>
<div class="wallet-header">
  <span id="main-title">Flash Card</span>
  <div class="actions" id="actions-exit" onclick="window.electronAPI.carica_html('home')">
    <button class="icon-btn" title="Chiudi">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
        <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </div>
</div>

<div class="container animation-box">
  <div class="card-section" style="cursor: pointer; user-select: none;"
    onclick="window.electronAPI.carica_html('_action/wallet'); global_var.back_html = 'virtual_cards'; save_global_var();">
    <div class="section-title" style="margin-top: 15px;">Scegli carta d'appoggio</div>

    <div class="card-columns">
      <img id="main-card" src="../../img/carte/carta.png" class="payment-card" draggable="false" alt="Carta">

      <div class="card-info-box">
        <span id="card-number" class="card-number">**** **** **** 1234</span>
        <span id="intestatario" class="card-holder">MARIO ROSSI</span>
      </div>
    </div>
    <div id="balance" class="section-title" style="margin-top: 15px; font-size: 40px; text-align: center;">
      12.00£</div>
  </div>

</div>
<div class="wallet-content animation-box">

  <div class="card-details">
    <div class="detail-row number-row">
      <div class="number-input-wrapper">
        <label>Numero carta</label>
        <input type="text" id="numero_carta" readonly>
      </div>
      <button class="copy-btn" id="copy-btn" onclick="handleCreaCarta(); card_builded = true;">Crea</button>
    </div>

    <div class="detail-row half">
      <div>
        <label>Scadenza</label>
        <input type="text" id="scadenza_carta" readonly>
      </div>
      <div>
        <label>Restrizioni</label>
        <input type="text" id="restrizioni" readonly value="000" style="color: #D1D5DB;">
      </div>
    </div>

    <div class="detail-row" >
      <label>Durata</label>
      <input type="text" id="durata" readonly style="cursor: pointer; user-select: none;" value="15m">
    </div>
    <div class="detail-row">
      <label id="saldo-text">Saldo ( euro )</label>
      <div class="input-wrapper">
        <input type="text" id="ammonto">
        <span class="euro-icon" onclick="switch_valute()" id="euro-icon">€</span>
      </div>
    </div>

    <div class="button-run">
      <button id="genera-cvv-btn" onclick="generate_card()" title="Le Flash Card sono carte temporanee per pagamenti piu sicuri">Genera Flash Card
        <svg width="16" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
      </button>
      
    </div>
  </div>
</div>

<script src="../_advice.js"></script>
<script src="script.js"></script>

</body>

</html>
