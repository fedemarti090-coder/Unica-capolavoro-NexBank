<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexBank / Change Valute</title>
  <link rel="stylesheet" href="../_animation.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="message-store"
    style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;">
  </div>
  <div class="wallet-header animation-box">
    <span>Cambio valute</span>

    <div class="actions">
      <button class="icon-btn" title="Profilo" onclick="window.electronAPI.carica_html('home')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
          <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>
  <div class="container animation-box">
    <div class="mobile-exchange-container">

      <div class="currency-section">
        <div id="name-left" class="currency-name">EURO</div>
        <input type="number" class="currency-input" id="input-left" placeholder="0.00" />
        <div class="currency-scroll-horizontal" id="left-scroll"></div>
      </div>

      <div class="exchange-equals-divider">
        <div class="line"></div>
        <span>=</span>
        <div class="line"></div>
      </div>

      <div class="currency-section">
        <div class="currency-scroll-horizontal" id="right-scroll"></div>
        <input type="number" class="currency-input" id="input-right" placeholder="0.00" readonly />
        <div id="name-right" class="currency-name">DOLLARO</div>
      </div>

    </div>
  </div>
  <script src="../_advice.js"></script>
  <script src="_valute_change.js"></script>
  <script src="script.js"></script>
</body>

</html>
