<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexBank / Cronologia</title>
  <link rel="stylesheet" href="../_animation.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="message-store" style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;"></div>
  <div class="wallet-header" style="z-index: 200;" >
    <span style="user-select: none;">Cronologia</span>
    <div class="actions" onclick="window.electronAPI.carica_html('home')">
      <button class="icon-btn" title="Chiudi">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
          <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <div class="wallet-scroll-wrapper">
    <div class="wallet-content" id="main-area-content">
      <div class="card-details balance-box" id="balance-box">
        <div class="balance-label" style="user-select: none;">Bilancio attuale</div>
        <div class="balance-amount" id="balance">0€</div>
      </div>
    </div>

    <div class="wallet-content" id="wallet-content-show">
      <div class="card-details payments-box">
        <div id="payments-list"></div>
      </div>
    </div>

  </div>



  <script src="../_advice.js"></script>
  <script src="script.js"></script>
</body>

</html>
