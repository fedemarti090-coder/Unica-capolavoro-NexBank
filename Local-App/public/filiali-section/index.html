<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexBank / Filiali</title>
  <link rel="stylesheet" href="../_animation.css">
  <link rel="stylesheet" href="style.css">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
               script-src 'self' https://maps.googleapis.com 'unsafe-inline'; 
               connect-src 'self' https://maps.googleapis.com; 
               img-src 'self' https://*.googleapis.com https://*.gstatic.com data:; 
               font-src 'self' https://fonts.gstatic.com; 
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
</head>

<body>
  <div id="message-store"
    style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;"></div>
  <div class="wallet-header">
    <span id="main-title">Filiali</span>
    <div class="actions" id="actions-exit" onclick="window.electronAPI.carica_html('home')">
      <button class="icon-btn" title="Chiudi">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
          <line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>


  <div id="map" class="map"></div>
  <script src="renderer.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCgGamNnX44UMqpppyQZtnWJEj0rKYoDUI&callback=initMap"
    async defer></script>

  <div class="info-box">
    <h3>Per assistenza fisica puoi trovare le sedi piu vicine a te</h3>
  </div>

  <script src="../_advice.js"></script>
  <script src="script.js"></script>

</body>

</html>
