<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=1.0">
    <title>NexBank / Home</title>
    <link rel="stylesheet" href="../_animation.css">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="home-box">


        <div id="message-store"
            style="position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: 9999; pointer-events: none;">
        </div>
        <div class="wallet-header animation-box">
            <span>Home</span>

            <div class="actions">
                <button title="Menu" onclick="toggleOptions()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="container animation-box">

            <div class="balance-box">
                <span style="user-select: none;">Saldo disponibile</span>
                <div class="saldo-container">
                    <h1 id="saldo"></h1>
                    <div class="ghost-toggle" onclick="toggleGhostMode()">
                        <svg id="ghost-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>
            </div>

            <img id="main-card" class="card-img" draggable="false" style="user-select: none;"
                onclick="window.electronAPI.carica_html('_action/wallet'); global_var.back_html = 'home'; save_global_var();">

            <div class="actions-grid">
                <div class="action" onclick="window.electronAPI.carica_html('_action/send')">💸<span>Invia</span></div>
                <div class="action" id="receive-btn" onclick="window.electronAPI.carica_html('_action/recive')">
                    📥<span>Ricevi</span>
                    <div class="notification-badge hidden" id="notification-badge"></div>
                </div>
                <div class="action" onclick="window.electronAPI.carica_html('_action/pay')">🧾<span>Paga</span></div>
            </div>

            <div class="transactions" id="cronology-section" style="user-select: none;">
                <h3>Ultimi movimenti</h3>


            </div>
        </div>
    </div>
    </div>
    <div id="black-overlay" class="black-overlay" onclick="toggleOptions(); "></div>

    <div id="section-bar" class="section-bar" style="user-select: none;">
        <div class="sidebar-header">
            <h2>OPZIONI</h2>
            <div class="actions">
                <button onclick="toggleOptions()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="options-list">
            <div class="option-item"
                onclick="window.electronAPI.carica_html('_action/wallet'); global_var.back_html = 'home'; save_global_var();">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="4" width="20" height="16" rx="2" stroke="white" stroke-width="2" />
                    <line x1="2" y1="8" x2="22" y2="8" stroke="white" stroke-width="2" />
                    <rect x="16" y="11" width="4" height="4" rx="1" fill="white" />
                </svg>
                <span>Portafoglio</span>
            </div>

            <div class="option-item" onclick="window.electronAPI.carica_html('card');">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>Aggiungi Carta</span>
            </div>
            <!--
            <div class="option-item" onclick="window.electronAPI.carica_html('virtual_cards')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2" />
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                <span>Carte Virtuali</span>
            </div>
            Area non finita
            -->
            
            
            <div class="option-item" onclick="window.electronAPI.carica_html('filiali')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <span>Trova Filiali</span>
            </div>


            <div class="option-item" onclick="window.electronAPI.carica_html('valute')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span>Cambio Valuta</span>
            </div>

            <div class="option-item"
                onclick="window.electronAPI.carica_html('contactless'); global_var.lastAccess = 'home'; save_global_var();">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="3" />
                    <path d="M7 16V8l4 8V8" />
                    <path d="M15 8a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2" />
                    <path d="M17 12h-2" />
                </svg>
                <span>Contactless</span>
            </div>

            <div class="option-item" onclick="window.electronAPI.carica_html('account')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2" />
                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="white" stroke-width="2" />
                </svg>
                <span>Il mio Account</span>
            </div>
            <h4 class="logout" onclick="logout()">Disconnetti</h4>
        </div>
    </div>

    </div>
    <script src="../_advice.js"></script>
    <script src="script.js"></script>

</body>

</html>
